
# Stud'Time — Inclusive AI EdTech (Flutter)

This repo bootstraps **Stud'Time**, an inclusive EdTech app prototype for South Africa with:
- Multilingual UI (English, isiZulu, Sesotho, Afrikaans)
- **TTS** (Text-to-Speech) reading coach
- **Dyslexia mode** & high-contrast toggle
- Offline-friendly architecture (local bundles)
- GitHub Actions CI to **build a Release APK** on every tag push

## 1) Prerequisites
- Flutter 3.x installed (`flutter --version`)
- Android SDK + a configured device/emulator

## 2) Create the Flutter skeleton
```bash
flutter create stud_time
cd stud_time
```

## 3) Overwrite with this starter
Copy the contents of this package over the generated project root (accept replace for `pubspec.yaml`, `lib/`, `.github/`).

## 4) Run locally
```bash
flutter pub get
flutter run
```

## 5) Build locally (optional)
```bash
flutter build apk --release
```

## 6) GitHub setup (APK on each tag)
1. Create a new GitHub repo (public or private)
2. Push your code:
```bash
git init
git add .
git commit -m "feat: initial Stud'Time starter"
git branch -M main
git remote add origin <YOUR_REPO_URL>
git push -u origin main
```
3. Push a version tag to trigger Release build:
```bash
git tag v0.1.0
git push origin v0.1.0
```
This triggers **GitHub Actions** to build the APK and attach it to a Release.

## 7) Feature roadmap (suggested)
- SASL assistance overlay (video tiles + quick phrases)
- Offline content bundles (per grade/subject)
- Teacher dashboard sync + analytics
- WhatsApp reminders (out-of-app comms)

